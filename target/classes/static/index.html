<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>DeskFlow</h1>
    <p>Finnish Office Hot Desk Booking</p>
</header>

<main>
    <section class="card">
        <h2>Find Available Desks</h2>

        <div class="form-row">
            <div>
                <label for="date">Date</label>
                <input type="date" id="date">
            </div>

            <div>
                <label for="floor">Floor</label>
                <select id="floor">
                    <option value="">All floors</option>
                    <option value="2">Floor 2</option>
                    <option value="3">Floor 3</option>
                </select>
            </div>

            <div>
                <label for="monitor">Monitor</label>
                <select id="monitor">
                    <option value="">Any</option>
                    <option value="true">Yes</option>
                    <option value="false">No</option>
                </select>
            </div>
        </div>

        <button onclick="loadAvailableDesks()">Search Desks</button>

        <p id="message"></p>

        <div id="deskList" class="desk-grid"></div>
    </section>

    <section class="card">
        <h2>Create Booking</h2>

        <form id="bookingForm">
            <label for="deskId">Desk ID</label>
            <input type="number" id="deskId" required>

            <label for="employeeName">Employee Name</label>
            <input type="text" id="employeeName" required>

            <label for="bookingDate">Booking Date</label>
            <input type="date" id="bookingDate" required>

            <button type="submit">Book Desk</button>
        </form>

        <p id="bookingMessage"></p>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
