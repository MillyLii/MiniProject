<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskFlow — Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">

<main class="login-card">
    <h1>DeskFlow</h1>
    <p class="login-subtitle">Finnish Office Hot Desk Booking</p>
    <p class="login-hint">Enter your employee name to open your booking workspace.</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="loginName">Employee Name</label>
            <input
                type="text"
                id="loginName"
                placeholder="For example: Anna Kowalska"
                required
                autofocus
            >
        </div>

        <button type="submit">Continue</button>
        <p id="loginMessage" class="message"></p>
    </form>

    <p class="login-examples">
        Seeded examples: Anna Kowalska · Mikko Korhonen · Sofia Virtanen
    </p>
</main>

<script>
    const form = document.getElementById("loginForm");
    const nameInput = document.getElementById("loginName");
    const message = document.getElementById("loginMessage");

    form.addEventListener("submit", function (event) {
        event.preventDefault();

        const name = nameInput.value.trim();

        if (!name) {
            message.textContent = "Employee name cannot be blank.";
            message.className = "message error";
            return;
        }

        window.location.href =
            "/app.html?employee=" + encodeURIComponent(name);
    });
</script>

</body>
</html>
